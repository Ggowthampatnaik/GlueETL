name: Create Glue Network Connection

on:
  workflow_dispatch:

env:
  NETWORK_CONNECTION_NAME: mysql-rds-network-connection
  RDS_INSTANCE_IDENTIFIER: Glue-Etl
  SUBNET_ID: subnet-0fec96bcf7da9adc4

jobs:
  create-network-connection:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get RDS Security Group
        run: |
          RDS_SG_ID=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId" \
            --output text)

          echo "RDS_SG_ID=$RDS_SG_ID" >> $GITHUB_ENV

      - name: Allow RDS Self Access
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$RDS_SG_ID" \
            --protocol tcp \
            --port 3306 \
            --source-group "$RDS_SG_ID" || true

      - name: Delete Existing Network Connection
        run: |
          aws glue delete-connection \
            --connection-name "$NETWORK_CONNECTION_NAME" || true

      - name: Create Network Connection
        run: |
          SUBNET_AZ=$(aws ec2 describe-subnets \
            --subnet-ids "$SUBNET_ID" \
            --query "Subnets[0].AvailabilityZone" \
            --output text)

          cat > network_connection.json <<EOF
          {
            "ConnectionInput": {
              "Name": "$NETWORK_CONNECTION_NAME",
              "ConnectionType": "NETWORK",
              "ConnectionProperties": {},
              "PhysicalConnectionRequirements": {
                "SubnetId": "$SUBNET_ID",
                "SecurityGroupIdList": ["$RDS_SG_ID"],
                "AvailabilityZone": "$SUBNET_AZ"
              }
            }
          }
          EOF

          aws glue create-connection \
            --cli-input-json file://network_connection.json

      - name: Verify Connection
        run: |
          aws glue get-connection \
            --name "$NETWORK_CONNECTION_NAME"
