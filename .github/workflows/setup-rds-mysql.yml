name: Setup RDS MySQL and Upload CSV

on:
  workflow_dispatch:

env:
  DB_INSTANCE_IDENTIFIER: Glue-Etl
  DB_NAME: salesdb
  DB_USERNAME: admin
  DB_PORT: 3306
  S3_BUCKET_NAME: glue-etl-mlops-pipeline

jobs:
  setup-rds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate DB Password Secret
        run: |
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "DB_PASSWORD secret is missing or empty"
            exit 1
          fi

      - name: Check or Create RDS MySQL Instance
        run: |
          if aws rds describe-db-instances \
            --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" 2>/dev/null; then
            echo "RDS instance already exists"
          else
            echo "Creating RDS MySQL instance"

            aws rds create-db-instance \
              --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" \
              --db-instance-class db.t3.micro \
              --engine mysql \
              --allocated-storage 20 \
              --master-username "$DB_USERNAME" \
              --master-user-password "${{ secrets.DB_PASSWORD }}" \
              --db-name "$DB_NAME" \
              --backup-retention-period 0 \
              --publicly-accessible
          fi

      - name: Wait for RDS Instance
        run: |
          aws rds wait db-instance-available \
            --db-instance-identifier "$DB_INSTANCE_IDENTIFIER"

      - name: Get RDS Endpoint
        run: |
          ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          echo "DB_ENDPOINT=$ENDPOINT" >> $GITHUB_ENV

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Create Table
        run: |
          mysql \
            -h "$DB_ENDPOINT" \
            -P "$DB_PORT" \
            -u "$DB_USERNAME" \
            -p"${{ secrets.DB_PASSWORD }}" \
            "$DB_NAME" \
            -e "
            CREATE TABLE IF NOT EXISTS sales_data (
              order_id INT,
              customer_name VARCHAR(100),
              product VARCHAR(100),
              quantity INT,
              price DECIMAL(10,2)
            );
            "

      - name: Upload CSV to RDS MySQL
        run: |
          mysql \
            -h "$DB_ENDPOINT" \
            -P "$DB_PORT" \
            -u "$DB_USERNAME" \
            -p"${{ secrets.DB_PASSWORD }}" \
            "$DB_NAME" \
            --local-infile=1 \
            -e "
            LOAD DATA LOCAL INFILE 'data/sample.csv'
            INTO TABLE sales_data
            FIELDS TERMINATED BY ','
            ENCLOSED BY '\"'
            LINES TERMINATED BY '\n'
            IGNORE 1 ROWS
            (order_id, customer_name, product, quantity, price);
            "
