name: Create Glue Job

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      role_arn:
        required: true
        type: string
      glue_job_name:
        required: true
        type: string
      script_s3_path:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  create-glue-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Upload Glue script to S3
        run: |
          aws s3 cp glue_scripts/data_validation.py "${{ inputs.script_s3_path }}"

      - name: Check if Glue job exists
        id: check_job
        run: |
          if aws glue get-job --job-name "${{ inputs.glue_job_name }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Glue job
        if: steps.check_job.outputs.exists == 'false'
        run: |
          aws glue create-job \
            --name "${{ inputs.glue_job_name }}" \
            --role "${{ inputs.role_arn }}" \
            --command "Name=glueetl,ScriptLocation=${{ inputs.script_s3_path }},PythonVersion=3" \
            --glue-version "4.0" \
            --worker-type "G.1X" \
            --number-of-workers 2 \
            --timeout 30 \
            --max-retries 0

      - name: Update Glue job
        if: steps.check_job.outputs.exists == 'true'
        run: |
          aws glue update-job \
            --job-name "${{ inputs.glue_job_name }}" \
            --job-update "{
              \"Role\": \"${{ inputs.role_arn }}\",
              \"Command\": {
                \"Name\": \"glueetl\",
                \"ScriptLocation\": \"${{ inputs.script_s3_path }}\",
                \"PythonVersion\": \"3\"
              },
              \"GlueVersion\": \"4.0\",
              \"WorkerType\": \"G.1X\",
              \"NumberOfWorkers\": 2,
              \"Timeout\": 30,
              \"MaxRetries\": 0
            }"
