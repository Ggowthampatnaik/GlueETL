name: Create Glue Resources

on:
  workflow_call:
    inputs:
      glue_job_name:
        required: true
        type: string
      s3_bucket_name:
        required: true
        type: string
      iam_role_arn:
        required: true
        type: string

jobs:
  create-glue:
    runs-on: ubuntu-latest

    env:
      GLUE_JOB_NAME: ${{ inputs.glue_job_name }}
      S3_BUCKET_NAME: ${{ inputs.s3_bucket_name }}
      IAM_ROLE_ARN: ${{ inputs.iam_role_arn }}
      RDS_INSTANCE_IDENTIFIER: Glue-Etl
      DB_NAME: glue_demo
      DB_USERNAME: admin
      GLUE_CONNECTION_NAME: mysql-rds-glue-connection

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Glue Script
        run: |
          aws s3 cp glue/glue_job.py s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py

      - name: Get RDS Network Details
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          RDS_SG_ID=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId" \
            --output text)

          SUBNET_GROUP=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].DBSubnetGroup.DBSubnetGroupName" \
            --output text)

          SUBNET_ID=$(aws rds describe-db-subnet-groups \
            --db-subnet-group-name "$SUBNET_GROUP" \
            --query "DBSubnetGroups[0].Subnets[0].SubnetIdentifier" \
            --output text)

          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_ENV
          echo "RDS_SG_ID=$RDS_SG_ID" >> $GITHUB_ENV
          echo "SUBNET_ID=$SUBNET_ID" >> $GITHUB_ENV

      - name: Allow RDS Security Group Self Access
        run: |
          if aws ec2 describe-security-groups \
            --group-ids "$RDS_SG_ID" \
            --query "SecurityGroups[0].IpPermissions[?FromPort==\`3306\` && ToPort==\`3306\`]" \
            --output text | grep -q "$RDS_SG_ID"; then
      
            echo "Security group self-access rule already exists"
      
          else
      
            aws ec2 authorize-security-group-ingress \
              --group-id "$RDS_SG_ID" \
              --protocol tcp \
              --port 3306 \
              --source-group "$RDS_SG_ID"
      
          fi

      - name: Delete Old Glue Connection
        run: |
          aws glue delete-connection \
            --connection-name mysql-rds-glue-connection || true
            
      - name: Create Glue Connection
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier Glue-Etl \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)
      
          RDS_SG_ID=$(aws rds describe-db-instances \
            --db-instance-identifier Glue-Etl \
            --query "DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId" \
            --output text)
      
          SUBNET_ID="subnet-0fec96bcf7da9adc4"
      
          cat > glue_connection.json <<EOF
          {
            "ConnectionInput": {
              "Name": "mysql-rds-glue-connection",
              "ConnectionType": "JDBC",
              "ConnectionProperties": {
                "JDBC_CONNECTION_URL": "jdbc:mysql://$RDS_ENDPOINT:3306/glue_demo",
                "USERNAME": "admin",
                "PASSWORD": "${{ secrets.DB_PASSWORD }}"
              },
              "PhysicalConnectionRequirements": {
                "SubnetId": "$SUBNET_ID",
                "SecurityGroupIdList": ["$RDS_SG_ID"]
              }
            }
          }
          EOF
      
          aws glue create-connection \
            --cli-input-json file://glue_connection.json
      
            
            
      - name: Verify Glue Connection
        run: |
          aws glue get-connection \
            --name "$GLUE_CONNECTION_NAME"

      - name: Debug Glue Connection
        run: |
          aws glue get-connection \
            --name mysql-rds-glue-connection \
            --query "Connection"
            

      - name: Create S3 VPC Endpoint for Glue Subnet
        run: |
          VPC_ID=$(aws ec2 describe-subnets \
            --subnet-ids "$SUBNET_ID" \
            --query "Subnets[0].VpcId" \
            --output text)
      
          ROUTE_TABLE_ID=$(aws ec2 describe-route-tables \
            --filters "Name=association.subnet-id,Values=$SUBNET_ID" \
            --query "RouteTables[0].RouteTableId" \
            --output text)
      
          if [ "$ROUTE_TABLE_ID" = "None" ] || [ -z "$ROUTE_TABLE_ID" ]; then
            ROUTE_TABLE_ID=$(aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=true" \
              --query "RouteTables[0].RouteTableId" \
              --output text)
          fi
      
          echo "VPC_ID=$VPC_ID"
          echo "SUBNET_ID=$SUBNET_ID"
          echo "ROUTE_TABLE_ID=$ROUTE_TABLE_ID"
      
          EXISTING_ENDPOINT=$(aws ec2 describe-vpc-endpoints \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=service-name,Values=com.amazonaws.${{ secrets.AWS_REGION }}.s3" \
            --query "VpcEndpoints[0].VpcEndpointId" \
            --output text)
      
          if [ "$EXISTING_ENDPOINT" = "None" ] || [ -z "$EXISTING_ENDPOINT" ]; then
            aws ec2 create-vpc-endpoint \
              --vpc-id "$VPC_ID" \
              --service-name "com.amazonaws.${{ secrets.AWS_REGION }}.s3" \
              --vpc-endpoint-type Gateway \
              --route-table-ids "$ROUTE_TABLE_ID"
          else
            echo "S3 VPC endpoint already exists: $EXISTING_ENDPOINT"
          fi

      - name: Verify Glue Connection
        run: |
          aws glue get-connection \
            --name mysql-rds-glue-connection \
            --query "Connection.[Name,ConnectionType,ConnectionProperties,PhysicalConnectionRequirements]"
      
      - name: Create Glue Job
        run: |
          aws glue delete-job --job-name "$GLUE_JOB_NAME" || true
      
          aws glue create-job \
            --name "$GLUE_JOB_NAME" \
            --role "$IAM_ROLE_ARN" \
            --command "Name=glueetl,ScriptLocation=s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py,PythonVersion=3" \
            --glue-version "5.0" \
            --worker-type "G.1X" \
            --number-of-workers 2 \
            --connections Connections=mysql-rds-glue-connection \
            --default-arguments '{"--job-language":"python"}'

      - name: Verify Glue Job Connection
        run: |
          aws glue get-job \
            --job-name sales-glue-job \
            --query "Job.Connections"
