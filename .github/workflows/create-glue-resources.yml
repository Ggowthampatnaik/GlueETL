name: Create Glue Resources

on:
  workflow_call:
    inputs:
      glue_job_name:
        required: true
        type: string
      s3_bucket_name:
        required: true
        type: string
      iam_role_arn:
        required: true
        type: string
      rds_instance_identifier:
        required: true
        type: string
      db_name:
        required: true
        type: string
      db_username:
        required: true
        type: string
      db_table:
        required: true
        type: string
      network_connection_name:
        required: true
        type: string
      script_location:
        required: true
        type: string
      output_path:
        required: true
        type: string
      github_role_arn:
        required: true
        type: string

jobs:
  create-glue:
    runs-on: ubuntu-latest

    env:
      GLUE_JOB_NAME: ${{ inputs.glue_job_name }}
      S3_BUCKET_NAME: ${{ inputs.s3_bucket_name }}
      IAM_ROLE_ARN: ${{ inputs.iam_role_arn }}
      RDS_INSTANCE_IDENTIFIER: ${{ inputs.rds_instance_identifier }}
      DB_NAME: ${{ inputs.db_name }}
      DB_USERNAME: ${{ inputs.db_username }}
      DB_TABLE: ${{ inputs.db_table }}
      NETWORK_CONNECTION_NAME: ${{ inputs.network_connection_name }}
      SCRIPT_LOCATION: ${{ inputs.script_location }}
      OUTPUT_PATH: ${{ inputs.output_path }}

    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:  ${{ inputs.github_role_arn }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Glue Script
        run: |
          aws s3 cp glue/glue_job.py "$SCRIPT_LOCATION"

      - name: Get RDS Endpoint
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_ENV

      - name: Verify Network Connection Exists
        run: |
          aws glue get-connection \
            --name "$NETWORK_CONNECTION_NAME" \
            --query "Connection.[Name,ConnectionType,PhysicalConnectionRequirements]"

      - name: Create or Update Glue Job
        env:
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
        run: |
          if aws glue get-job --job-name "$GLUE_JOB_NAME" 2>/dev/null; then

            echo "Glue job exists. Updating job..."

            aws glue update-job \
              --job-name "$GLUE_JOB_NAME" \
              --job-update "{
                \"Role\": \"$IAM_ROLE_ARN\",
                \"Command\": {
                  \"Name\": \"glueetl\",
                  \"ScriptLocation\": \"$SCRIPT_LOCATION\",
                  \"PythonVersion\": \"3\"
                },
                \"GlueVersion\": \"5.0\",
                \"WorkerType\": \"G.1X\",
                \"NumberOfWorkers\": 2,
                \"Connections\": {
                  \"Connections\": [\"$NETWORK_CONNECTION_NAME\"]
                },
                \"DefaultArguments\": {
                  \"--job-language\": \"python\",
                  \"--rds_endpoint\": \"$RDS_ENDPOINT\",
                  \"--db_name\": \"$DB_NAME\",
                  \"--db_username\": \"$DB_USERNAME\",
                  \"--db_password\": \"$DB_PASSWORD_SECRET\",
                  \"--db_table\": \"$DB_TABLE\",
                  \"--output_path\": \"$OUTPUT_PATH\"
                }
              }"

          else

            echo "Glue job does not exist. Creating job..."

            aws glue create-job \
              --name "$GLUE_JOB_NAME" \
              --role "$IAM_ROLE_ARN" \
              --command "Name=glueetl,ScriptLocation=$SCRIPT_LOCATION,PythonVersion=3" \
              --glue-version "5.0" \
              --worker-type "G.1X" \
              --number-of-workers 2 \
              --connections Connections="$NETWORK_CONNECTION_NAME" \
              --default-arguments "{
                \"--job-language\":\"python\",
                \"--rds_endpoint\":\"$RDS_ENDPOINT\",
                \"--db_name\":\"$DB_NAME\",
                \"--db_username\":\"$DB_USERNAME\",
                \"--db_password\":\"$DB_PASSWORD_SECRET\",
                \"--db_table\":\"$DB_TABLE\",
                 \"--output_path\": \"$OUTPUT_PATH\"
              }"

          fi

      - name: Verify Glue Job Connection
        run: |
          aws glue get-job \
            --job-name "$GLUE_JOB_NAME" \
            --query "Job.Connections"
