name: Create Glue Resources

on:
  workflow_call:
    inputs:
      glue_job_name:
        required: true
        type: string
      s3_bucket_name:
        required: true
        type: string
      iam_role_arn:
        required: true
        type: string

jobs:
  create-glue:
    runs-on: ubuntu-latest

    env:
      GLUE_JOB_NAME: ${{ inputs.glue_job_name }}
      S3_BUCKET_NAME: ${{ inputs.s3_bucket_name }}
      IAM_ROLE_ARN: ${{ inputs.iam_role_arn }}

      RDS_INSTANCE_IDENTIFIER: Glue-Etl
      DB_NAME: glue_demo
      DB_USERNAME: admin
      DB_TABLE: glue_demo
      NETWORK_CONNECTION_NAME: mysql-rds-network-connection

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Glue Script
        run: |
          aws s3 cp glue/glue_job.py s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py

      - name: Get RDS Endpoint
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_IDENTIFIER" \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_ENV

      - name: Delete Existing Glue Job
        run: |
          aws glue delete-job \
            --job-name "$GLUE_JOB_NAME" || true

      - name: Create Glue Job
        env:
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
        run: |
          aws glue create-job \
            --name "$GLUE_JOB_NAME" \
            --role "$IAM_ROLE_ARN" \
            --command "Name=glueetl,ScriptLocation=s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py,PythonVersion=3" \
            --glue-version "5.0" \
            --worker-type "G.1X" \
            --number-of-workers 2 \
            --connections Connections="$NETWORK_CONNECTION_NAME" \
            --default-arguments "{
              \"--job-language\":\"python\",
              \"--rds_endpoint\":\"$RDS_ENDPOINT\",
              \"--db_name\":\"$DB_NAME\",
              \"--db_username\":\"$DB_USERNAME\",
              \"--db_password\":\"$DB_PASSWORD_SECRET\",
              \"--db_table\":\"$DB_TABLE\",
              \"--output_path\":\"s3://$S3_BUCKET_NAME/output/\"
            }"

      - name: Verify Glue Job Connection
        run: |
          aws glue get-job \
            --job-name "$GLUE_JOB_NAME" \
            --query "Job.Connections"
