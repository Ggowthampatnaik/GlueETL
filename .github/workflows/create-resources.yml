name: Create Resources

on:
  workflow_call:
    inputs:
      redshift_namespace_name:
        required: true
        type: string
      redshift_workgroup_name:
        required: true
        type: string
      redshift_database_name:
        required: true
        type: string
      glue_job_name:
        required: true
        type: string
      s3_bucket_name:
        required: true
        type: string
      iam_role_arn:
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

      REDSHIFT_NAMESPACE_NAME: ${{ inputs.redshift_namespace_name }}
      REDSHIFT_WORKGROUP_NAME: ${{ inputs.redshift_workgroup_name }}
      REDSHIFT_DATABASE_NAME: ${{ inputs.redshift_database_name }}

      GLUE_JOB_NAME: ${{ inputs.glue_job_name }}
      S3_BUCKET_NAME: ${{ inputs.s3_bucket_name }}
      IAM_ROLE_ARN: ${{ inputs.iam_role_arn }}

      REDSHIFT_MASTER_USER: ${{ secrets.REDSHIFT_MASTER_USER }}
      REDSHIFT_MASTER_PASSWORD: ${{ secrets.REDSHIFT_MASTER_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check or Create S3 Bucket
        run: |
          if aws s3api head-bucket --bucket "$S3_BUCKET_NAME" 2>/dev/null; then
            echo "Bucket already exists"
          else
            echo "Creating bucket"

            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$S3_BUCKET_NAME"
            else
              aws s3api create-bucket \
                --bucket "$S3_BUCKET_NAME" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

      - name: Upload CSV Files to S3
        run: |
          aws s3 sync data/ s3://$S3_BUCKET_NAME/data/

      - name: Check or Create Redshift Serverless Namespace
        run: |
          if aws redshift-serverless get-namespace \
            --namespace-name "$REDSHIFT_NAMESPACE_NAME" 2>/dev/null; then
            echo "Namespace already exists"
          else
            echo "Creating namespace"

            aws redshift-serverless create-namespace \
              --namespace-name "$REDSHIFT_NAMESPACE_NAME" \
              --db-name "$REDSHIFT_DATABASE_NAME" \
              --admin-username "$REDSHIFT_MASTER_USER" \
              --admin-user-password "$REDSHIFT_MASTER_PASSWORD" \
              --iam-roles "$IAM_ROLE_ARN"
          fi
          
      - name: Attach IAM Role to Redshift Serverless Namespace
        run: |
          aws redshift-serverless update-namespace \
            --namespace-name "$REDSHIFT_NAMESPACE_NAME" \
            --iam-roles "$IAM_ROLE_ARN"

      - name: Check or Create Redshift Serverless Workgroup
        run: |
          if aws redshift-serverless get-workgroup \
            --workgroup-name "$REDSHIFT_WORKGROUP_NAME" 2>/dev/null; then
            echo "Workgroup already exists"
          else
            echo "Creating workgroup"

            aws redshift-serverless create-workgroup \
              --workgroup-name "$REDSHIFT_WORKGROUP_NAME" \
              --namespace-name "$REDSHIFT_NAMESPACE_NAME" \
              --base-capacity 8 \
              --publicly-accessible
          fi

      - name: Wait for Redshift Serverless Workgroup
        run: |
          for i in {1..30}; do
            STATUS=$(aws redshift-serverless get-workgroup \
              --workgroup-name "$REDSHIFT_WORKGROUP_NAME" \
              --query "workgroup.status" \
              --output text)

            echo "Workgroup status: $STATUS"

            if [ "$STATUS" = "AVAILABLE" ]; then
              break
            fi

            sleep 30
          done

      - name: Get Redshift Serverless Endpoint
        run: |
          ENDPOINT=$(aws redshift-serverless get-workgroup \
            --workgroup-name "$REDSHIFT_WORKGROUP_NAME" \
            --query "workgroup.endpoint.address" \
            --output text)

          echo "REDSHIFT_ENDPOINT=$ENDPOINT" >> $GITHUB_ENV

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Allow GitHub Runner to Access Redshift
        run: |
          SG_ID=$(aws redshift-serverless get-workgroup \
            --workgroup-name "$REDSHIFT_WORKGROUP_NAME" \
            --query "workgroup.securityGroupIds[0]" \
            --output text)
      
          MY_IP=$(curl -s https://checkip.amazonaws.com)
      
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 5439 \
            --cidr "$MY_IP/32" || true

      - name: Create Schema Table and Load CSV
        run: |
          export PGPASSWORD="$REDSHIFT_MASTER_PASSWORD"
      
          psql \
            -h "$REDSHIFT_ENDPOINT" \
            -p 5439 \
            -U "$REDSHIFT_MASTER_USER" \
            -d "$REDSHIFT_DATABASE_NAME" \
            -c "CREATE SCHEMA IF NOT EXISTS glue_demo;"
      
          psql \
            -h "$REDSHIFT_ENDPOINT" \
            -p 5439 \
            -U "$REDSHIFT_MASTER_USER" \
            -d "$REDSHIFT_DATABASE_NAME" \
            -c "
            CREATE TABLE IF NOT EXISTS glue_demo.sales_data (
              order_id INT,
              customer_name VARCHAR(100),
              product VARCHAR(100),
              quantity INT,
              price DECIMAL(10,2)
            );
            "
      
          psql \
            -h "$REDSHIFT_ENDPOINT" \
            -p 5439 \
            -U "$REDSHIFT_MASTER_USER" \
            -d "$REDSHIFT_DATABASE_NAME" \
            -c "
            COPY glue_demo.sales_data
            FROM 's3://$S3_BUCKET_NAME/data/'
            IAM_ROLE '$IAM_ROLE_ARN'
            CSV
            IGNOREHEADER 1;
            "

      - name: Upload Glue Script
        run: |
          aws s3 cp glue/glue_job.py s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py

      - name: Check or Create Glue Job
        run: |
          if aws glue get-job --job-name "$GLUE_JOB_NAME" 2>/dev/null; then
            echo "Glue job already exists"
          else
            echo "Creating Glue Job"

            aws glue create-job \
              --name "$GLUE_JOB_NAME" \
              --role "$IAM_ROLE_ARN" \
              --command "Name=glueetl,ScriptLocation=s3://$S3_BUCKET_NAME/glue-scripts/glue_job.py,PythonVersion=3" \
              --glue-version "4.0" \
              --worker-type "G.1X" \
              --number-of-workers 2 \
              --default-arguments '{"--job-language":"python"}'
          fi
